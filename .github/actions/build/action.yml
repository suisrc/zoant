name: 'Build Image Logic'
description: 'Build image steps for jobs'

inputs:
  github_token:
    description: 'github registry workflow token'
    required: true
    secret: true
  # docker_user:
  #   description: 'docker.io user name'
  #   required: true
  # docker_token:
  #   description: 'docker.io user token'
  #   required: true
  #   secret: true

runs:
  using: 'composite'
  steps:
    - name: Setup version
      shell: bash
      run: |
        TAG_NAME=${GITHUB_REF#refs/tags/}
        echo ${TAG_NAME#v} > version
        echo $GITHUB_JOB > vname
        echo "IMAGE_VERSION=${TAG_NAME#v}" >> $GITHUB_ENV
        # echo "IMAGE_VERSION=${TAG_NAME#v}-$GITHUB_JOB" >> $GITHUB_ENV
    - name: Build image
      shell: bash
      run: |
        echo "appname: `cat vname`, version: `cat version`"
        sed -i "s|app|`cat vname`|g" Dockerfile
        docker build -t image --no-cache .
        # make && docker build -t image --no-cache .
    - name: Push github image
      shell: bash
      run: |
        REGISTRY_URL=$GITHUB_REGISTRY
        echo "${{ inputs.github_token }}" | docker login $REGISTRY_URL -u ${{ github.actor }} --password-stdin
        IMAGE_ID=$REGISTRY_URL/$GITHUB_REPOSITORY
        echo IMAGE_ID=$IMAGE_ID
        VERSION=$IMAGE_VERSION
        echo VERSION=$VERSION
        docker tag image $IMAGE_ID:$VERSION
        docker push $IMAGE_ID:$VERSION
